<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Shadow -->
  <ellipse cx="80" cy="152" rx="70" ry="8" fill="#000" opacity="0.2"/>

  <!-- === CATAPULT MACHINE === -->

  <!-- Wheels (big chunky CoC-style) -->
  <!-- Left wheel -->
  <circle cx="28" cy="120" r="26" fill="#3a2008" stroke="#1a1a1a" stroke-width="3.5"/>
  <circle cx="28" cy="120" r="19" fill="#4a2c0e"/>
  <circle cx="28" cy="120" r="7" fill="#6a4010" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Spokes -->
  <line x1="28" y1="94" x2="28" y2="146" stroke="#6a4010" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="2" y1="120" x2="54" y2="120" stroke="#6a4010" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="9" y1="101" x2="47" y2="139" stroke="#6a4010" stroke-width="3" stroke-linecap="round"/>
  <line x1="47" y1="101" x2="9" y2="139" stroke="#6a4010" stroke-width="3" stroke-linecap="round"/>
  <!-- Wheel metal rim highlight -->
  <circle cx="28" cy="120" r="26" fill="none" stroke="#8a5a20" stroke-width="2" opacity="0.6"/>
  <circle cx="22" cy="98" r="4" fill="#8a6030" opacity="0.5"/>

  <!-- Right wheel -->
  <circle cx="132" cy="120" r="26" fill="#3a2008" stroke="#1a1a1a" stroke-width="3.5"/>
  <circle cx="132" cy="120" r="19" fill="#4a2c0e"/>
  <circle cx="132" cy="120" r="7" fill="#6a4010" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="132" y1="94" x2="132" y2="146" stroke="#6a4010" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="106" y1="120" x2="158" y2="120" stroke="#6a4010" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="113" y1="101" x2="151" y2="139" stroke="#6a4010" stroke-width="3" stroke-linecap="round"/>
  <line x1="151" y1="101" x2="113" y2="139" stroke="#6a4010" stroke-width="3" stroke-linecap="round"/>
  <circle cx="138" cy="98" r="4" fill="#8a6030" opacity="0.5"/>

  <!-- Chassis base -->
  <rect x="22" y="106" width="116" height="20" rx="7" fill="#6a4010" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Chassis planks detail -->
  <line x1="50" y1="106" x2="50" y2="126" stroke="#5a3408" stroke-width="2"/>
  <line x1="80" y1="106" x2="80" y2="126" stroke="#5a3408" stroke-width="2"/>
  <line x1="110" y1="106" x2="110" y2="126" stroke="#5a3408" stroke-width="2"/>
  <!-- Axle -->
  <rect x="20" y="112" width="120" height="8" rx="4" fill="#3a2008" stroke="#1a1a1a" stroke-width="2"/>

  <!-- A-frame supports -->
  <line x1="50" y1="108" x2="72" y2="72" stroke="#6a4010" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="108" x2="72" y2="72" stroke="#6a4010" stroke-width="8" stroke-linecap="round"/>
  <!-- Support braces -->
  <line x1="54" y1="96" x2="84" y2="96" stroke="#5a3408" stroke-width="4" stroke-linecap="round"/>
  <!-- Pivot axle -->
  <circle cx="72" cy="72" r="9" fill="#3a2008" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="72" cy="72" r="5" fill="#c0a020"/>
  <circle cx="70" cy="70" r="2" fill="white" opacity="0.5"/>

  <!-- Catapult arm -->
  <!-- Long arm going back-up -->
  <rect x="69" y="18" width="10" height="58" rx="5" fill="#7a4a18" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(15 74 72)"/>
  <!-- Short arm going forward (counterweight side) -->
  <rect x="69" y="72" width="10" height="32" rx="5" fill="#7a4a18" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(-30 74 72)"/>

  <!-- Counterweight box -->
  <rect x="82" y="82" width="22" height="18" rx="5" fill="#3a2008" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="84" y1="91" x2="102" y2="91" stroke="#5a3408" stroke-width="1.5"/>
  <line x1="93" y1="83" x2="93" y2="99" stroke="#5a3408" stroke-width="1.5"/>
  <!-- Weight bolts -->
  <circle cx="85" cy="84" r="2" fill="#8a6030"/>
  <circle cx="101" cy="84" r="2" fill="#8a6030"/>
  <circle cx="85" cy="98" r="2" fill="#8a6030"/>
  <circle cx="101" cy="98" r="2" fill="#8a6030"/>

  <!-- Sling cup at launch end -->
  <path d="M40 32 Q32 42 36 52" stroke="#5a3010" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="36" cy="55" r="12" fill="#4a2a08" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Boulder in cup (big, round, cracked) -->
  <circle cx="36" cy="52" r="16" fill="#707070" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="36" cy="52" r="13" fill="#888"/>
  <!-- Rock cracks -->
  <path d="M30 46 Q36 52 34 60" stroke="#555" stroke-width="2" fill="none"/>
  <path d="M38 44 Q44 50 40 58" stroke="#555" stroke-width="1.5" fill="none"/>
  <path d="M28 54 Q34 52 40 56" stroke="#555" stroke-width="1.5" fill="none"/>
  <!-- Boulder highlight -->
  <circle cx="30" cy="46" r="5" fill="#aaa" opacity="0.5"/>

  <!-- Fire effect on boulder (upgraded visual hint) -->
  <path d="M28 38 Q26 28 30 24 Q32 30 34 26 Q36 22 38 28 Q40 24 42 30 Q44 26 44 36 Q40 30 36 36 Q32 30 28 38 Z" fill="#ff6020" opacity="0.85" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M30 38 Q29 31 32 28 Q33 32 35 29 Q37 25 39 31 Q41 27 41 36 Q38 30 35 35 Q32 31 30 38 Z" fill="#ffa020" opacity="0.9"/>
  <path d="M33 36 Q33 30 36 28 Q39 30 39 36 Q37 32 36 34 Q35 32 33 36 Z" fill="#ffee60" opacity="0.9"/>

  <!-- === OPERATOR (small goblin/soldier cranking the catapult) === -->
  <!-- Body -->
  <rect x="102" y="86" width="16" height="20" rx="6" fill="#8a4a20" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <rect x="102" y="104" width="7" height="14" rx="4" fill="#6a3a10" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="111" y="104" width="7" height="14" rx="4" fill="#6a3a10" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Boots -->
  <ellipse cx="105" cy="118" rx="6" ry="4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="115" cy="118" rx="6" ry="4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Arms -->
  <rect x="88" y="89" width="16" height="9" rx="4" fill="#8a4a20" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="116" y="89" width="14" height="9" rx="4" fill="#8a4a20" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Head (chibi) -->
  <circle cx="110" cy="80" r="12" fill="#f5c488" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Helmet -->
  <path d="M98 80 Q98 64 110 62 Q122 64 122 80" fill="#6a3a10" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Helmet strap -->
  <rect x="97" y="79" width="26" height="5" rx="2" fill="#5a2a08" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="106" cy="79" r="3.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="114" cy="79" r="3.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="107" cy="79" r="2" fill="#333"/>
  <circle cx="115" cy="79" r="2" fill="#333"/>
  <circle cx="108" cy="78" r="1" fill="white"/>
  <circle cx="116" cy="78" r="1" fill="white"/>
  <!-- Mouth (determined grin) -->
  <path d="M106 86 Q110 89 114 86" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Sweat drop (hard working!) -->
  <path d="M122 70 Q124 64 122 60" stroke="#80d0ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="122" cy="58" r="3" fill="#80d0ff" stroke="#1a1a1a" stroke-width="1"/>

  <!-- === NAME LABEL === -->
  <rect x="30" y="145" width="100" height="18" rx="6" fill="#2a1408" stroke="#8a5a20" stroke-width="2"/>
  <text x="80" y="158" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#e8a840" letter-spacing="2">CATAPULT</text>
</svg>
