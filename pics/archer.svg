<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <!-- Shadow -->
  <ellipse cx="60" cy="152" rx="36" ry="7" fill="#000" opacity="0.18"/>

  <!-- === LEGS === -->
  <!-- Left leg -->
  <rect x="38" y="112" width="18" height="24" rx="8" fill="#4a7c3f" stroke="#1a2e14" stroke-width="2.5"/>
  <!-- Right leg -->
  <rect x="64" y="112" width="18" height="24" rx="8" fill="#4a7c3f" stroke="#1a2e14" stroke-width="2.5"/>
  <!-- Left boot -->
  <ellipse cx="47" cy="136" rx="12" ry="7" fill="#2a1a0a" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Right boot -->
  <ellipse cx="73" cy="136" rx="12" ry="7" fill="#2a1a0a" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === SKIRT / TUNIC BOTTOM === -->
  <path d="M34 108 Q36 124 44 126 Q60 130 76 126 Q84 124 86 108 Z" fill="#6aab3f" stroke="#1a3a10" stroke-width="2.5"/>

  <!-- === BODY === -->
  <rect x="34" y="76" width="52" height="36" rx="12" fill="#7dc84a" stroke="#1a3a10" stroke-width="3"/>
  <!-- Belt -->
  <rect x="34" y="104" width="52" height="9" rx="4" fill="#5a3010" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="53" y="105" width="14" height="7" rx="2" fill="#c8a020" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Chest highlight -->
  <ellipse cx="60" cy="87" rx="14" ry="8" fill="#96e055" opacity="0.5"/>

  <!-- === LEFT ARM (bow arm, stretched out) === -->
  <rect x="12" y="84" width="24" height="14" rx="7" fill="#7dc84a" stroke="#1a3a10" stroke-width="2.5"/>
  <!-- Left hand -->
  <circle cx="14" cy="91" r="7" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === RIGHT ARM (draw arm, pulled back) === -->
  <rect x="84" y="84" width="22" height="14" rx="7" fill="#7dc84a" stroke="#1a3a10" stroke-width="2.5"/>
  <!-- Right hand -->
  <circle cx="104" cy="91" r="7" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === BOW === -->
  <path d="M16 62 Q2 90 16 118" stroke="#8B4513" stroke-width="5" fill="none" stroke-linecap="round"/>
  <line x1="16" y1="62" x2="16" y2="118" stroke="#ffe8a0" stroke-width="1.5"/>
  <!-- Bow grip wrap -->
  <rect x="12" y="85" width="8" height="12" rx="3" fill="#5a3010" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- === ARROW === -->
  <line x1="18" y1="91" x2="103" y2="91" stroke="#8B4513" stroke-width="2.5"/>
  <!-- Arrowhead -->
  <polygon points="103,86 103,96 114,91" fill="#c0c0c0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Fletching -->
  <polygon points="20,86 20,96 10,91" fill="#dd3333" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="26,87 26,95 18,91" fill="#dd3333" stroke="#1a1a1a" stroke-width="1"/>

  <!-- === QUIVER (on back) === -->
  <rect x="76" y="76" width="12" height="28" rx="5" fill="#8B4513" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="78" y1="76" x2="78" y2="80" stroke="#c87820" stroke-width="2"/>
  <line x1="82" y1="74" x2="82" y2="80" stroke="#c87820" stroke-width="2"/>
  <line x1="86" y1="76" x2="86" y2="80" stroke="#c87820" stroke-width="2"/>

  <!-- === NECK === -->
  <rect x="53" y="68" width="14" height="12" rx="5" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="50" rx="28" ry="26" fill="#f5c488" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Hair (long purple braid — CoC archer style) -->
  <!-- Back hair -->
  <path d="M34 44 Q28 70 34 86 Q38 92 42 88 Q38 72 42 56 Z" fill="#9b30d0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Top hair -->
  <path d="M32 38 Q36 18 60 16 Q84 18 88 38 Q80 30 60 28 Q40 30 32 38 Z" fill="#b040f0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Hair highlight -->
  <path d="M42 20 Q55 14 68 18" stroke="#d080ff" stroke-width="3" fill="none" opacity="0.7"/>

  <!-- Hood / cap -->
  <path d="M34 42 Q36 28 60 24 Q84 28 86 42 Q80 36 60 34 Q40 36 34 42 Z" fill="#4a9a28" stroke="#1a3a10" stroke-width="2"/>

  <!-- === FACE === -->
  <!-- Eyes -->
  <ellipse cx="50" cy="48" rx="7" ry="8" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="70" cy="48" rx="7" ry="8" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="51" cy="49" r="4.5" fill="#3a8020"/>
  <circle cx="71" cy="49" r="4.5" fill="#3a8020"/>
  <circle cx="52" cy="48" r="2.5" fill="#1a1a1a"/>
  <circle cx="72" cy="48" r="2.5" fill="#1a1a1a"/>
  <!-- Eye highlights -->
  <circle cx="53" cy="46" r="1.5" fill="white"/>
  <circle cx="73" cy="46" r="1.5" fill="white"/>
  <!-- Eyelashes top -->
  <path d="M43 42 Q50 40 57 42" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M63 42 Q70 40 77 42" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="60" cy="55" r="2.5" fill="#e8a868" stroke="#c88848" stroke-width="1"/>

  <!-- Smile -->
  <path d="M53 62 Q60 68 67 62" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M54 62 Q60 66 66 62" fill="#ff8888" opacity="0.5"/>

  <!-- Cheek blush -->
  <ellipse cx="44" cy="58" rx="6" ry="4" fill="#ff9999" opacity="0.4"/>
  <ellipse cx="76" cy="58" rx="6" ry="4" fill="#ff9999" opacity="0.4"/>

  <!-- === NAME LABEL === -->
  <rect x="20" y="145" width="80" height="18" rx="6" fill="#1a3a10" stroke="#4a9a28" stroke-width="2"/>
  <text x="60" y="158" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#a8f050" letter-spacing="2">ARCHER</text>
</svg>
