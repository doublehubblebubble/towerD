<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <!-- Shadow -->
  <ellipse cx="60" cy="152" rx="36" ry="7" fill="#000" opacity="0.18"/>

  <!-- === LEGS === -->
  <rect x="38" y="112" width="18" height="24" rx="8" fill="#3a4a6a" stroke="#1a1a2a" stroke-width="2.5"/>
  <rect x="64" y="112" width="18" height="24" rx="8" fill="#3a4a6a" stroke="#1a1a2a" stroke-width="2.5"/>
  <!-- Boots -->
  <ellipse cx="47" cy="136" rx="13" ry="7" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="73" cy="136" rx="13" ry="7" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Boot highlight -->
  <ellipse cx="43" cy="133" rx="5" ry="3" fill="#444" opacity="0.7"/>
  <ellipse cx="69" cy="133" rx="5" ry="3" fill="#444" opacity="0.7"/>

  <!-- === BODY ARMOR === -->
  <rect x="32" y="76" width="56" height="40" rx="12" fill="#4a5a80" stroke="#1a1a2a" stroke-width="3"/>
  <!-- Chest plate -->
  <rect x="38" y="80" width="44" height="28" rx="8" fill="#5a6e9a" stroke="#1a1a2a" stroke-width="2"/>
  <!-- Center ridge -->
  <line x1="60" y1="80" x2="60" y2="108" stroke="#7a8eb0" stroke-width="3" stroke-linecap="round"/>
  <!-- Armor horizontal bands -->
  <line x1="38" y1="92" x2="82" y2="92" stroke="#7a8eb0" stroke-width="1.5"/>
  <line x1="38" y1="101" x2="82" y2="101" stroke="#7a8eb0" stroke-width="1.5"/>
  <!-- Chest highlight -->
  <ellipse cx="52" cy="84" rx="10" ry="6" fill="#8aa0c0" opacity="0.45"/>
  <!-- Belt -->
  <rect x="32" y="108" width="56" height="10" rx="4" fill="#1a1a2a" stroke="#1a1a2a" stroke-width="2"/>
  <rect x="52" y="109" width="16" height="8" rx="2" fill="#888" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Shoulder pads -->
  <ellipse cx="34" cy="82" rx="10" ry="8" fill="#5a6e9a" stroke="#1a1a2a" stroke-width="2.5"/>
  <ellipse cx="86" cy="82" rx="10" ry="8" fill="#5a6e9a" stroke="#1a1a2a" stroke-width="2.5"/>

  <!-- === LEFT ARM === -->
  <rect x="10" y="86" width="26" height="13" rx="6" fill="#4a5a80" stroke="#1a1a2a" stroke-width="2.5"/>
  <!-- Vambrace -->
  <rect x="10" y="86" width="12" height="13" rx="5" fill="#5a6e9a" stroke="#1a1a2a" stroke-width="2"/>
  <circle cx="12" cy="92" r="6" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === RIGHT ARM === -->
  <rect x="84" y="86" width="26" height="13" rx="6" fill="#4a5a80" stroke="#1a1a2a" stroke-width="2.5"/>
  <circle cx="108" cy="92" r="6" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === CROSSBOW (big, CoC-style oversized) === -->
  <!-- Stock -->
  <rect x="14" y="87" width="92" height="10" rx="4" fill="#6a3a10" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Prod (limbs of crossbow) -->
  <path d="M18 87 Q14 72 22 68" stroke="#3a2008" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M18 97 Q14 112 22 116" stroke="#3a2008" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- String -->
  <line x1="22" y1="68" x2="22" y2="116" stroke="#ffe8a0" stroke-width="1.5"/>
  <!-- Trigger guard -->
  <path d="M70 97 Q76 106 82 97" stroke="#3a2008" stroke-width="3" fill="none"/>
  <!-- Scope sight -->
  <rect x="58" y="82" width="18" height="6" rx="2" fill="#2a3a4a" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="67" cy="85" r="2" fill="#40c0f0" opacity="0.8"/>
  <!-- Bolt loaded -->
  <line x1="24" y1="92" x2="90" y2="92" stroke="#8B4513" stroke-width="2.5"/>
  <polygon points="90,87 90,97 102,92" fill="#c8c8c8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Bolt fletching -->
  <polygon points="26,87 26,97 18,92" fill="#2244cc" stroke="#1a1a1a" stroke-width="1"/>

  <!-- === NECK === -->
  <rect x="53" y="68" width="14" height="12" rx="5" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="48" rx="28" ry="26" fill="#f5c488" stroke="#1a1a1a" stroke-width="3"/>

  <!-- === HELMET === -->
  <path d="M32 46 Q32 18 60 14 Q88 18 88 46 Q80 36 60 34 Q40 36 32 46 Z" fill="#4a5a80" stroke="#1a1a2a" stroke-width="3"/>
  <!-- Helmet brim -->
  <rect x="30" y="44" width="60" height="10" rx="5" fill="#3a4a70" stroke="#1a1a2a" stroke-width="2.5"/>
  <!-- Helmet ridge / crest -->
  <rect x="56" y="14" width="8" height="30" rx="4" fill="#5a6e9a" stroke="#1a1a2a" stroke-width="2"/>
  <!-- Nose guard -->
  <rect x="57" y="50" width="6" height="18" rx="3" fill="#3a4a70" stroke="#1a1a2a" stroke-width="2"/>
  <!-- Cheek guards -->
  <rect x="32" y="48" width="8" height="14" rx="4" fill="#3a4a70" stroke="#1a1a2a" stroke-width="2"/>
  <rect x="80" y="48" width="8" height="14" rx="4" fill="#3a4a70" stroke="#1a1a2a" stroke-width="2"/>
  <!-- Helmet highlight -->
  <ellipse cx="50" cy="22" rx="10" ry="6" fill="#7a8eb0" opacity="0.5"/>

  <!-- Eyes (either side of nose guard) -->
  <ellipse cx="48" cy="50" rx="6" ry="7" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="72" cy="50" rx="6" ry="7" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="49" cy="51" r="4" fill="#1a4080"/>
  <circle cx="73" cy="51" r="4" fill="#1a4080"/>
  <circle cx="50" cy="50" r="2.5" fill="#111"/>
  <circle cx="74" cy="50" r="2.5" fill="#111"/>
  <circle cx="51" cy="48" r="1.5" fill="white"/>
  <circle cx="75" cy="48" r="1.5" fill="white"/>

  <!-- Mouth / stubble -->
  <path d="M54 62 Q60 67 66 62" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stubble dots -->
  <circle cx="53" cy="60" r="1.2" fill="#c09060" opacity="0.6"/>
  <circle cx="58" cy="61" r="1.2" fill="#c09060" opacity="0.6"/>
  <circle cx="63" cy="61" r="1.2" fill="#c09060" opacity="0.6"/>
  <circle cx="68" cy="60" r="1.2" fill="#c09060" opacity="0.6"/>

  <!-- === NAME LABEL === -->
  <rect x="10" y="145" width="100" height="18" rx="6" fill="#1a2a40" stroke="#4a6a9a" stroke-width="2"/>
  <text x="60" y="158" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#80c0ff" letter-spacing="1">CROSSBOWMAN</text>
</svg>
