<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <!-- Shadow -->
  <ellipse cx="60" cy="152" rx="36" ry="7" fill="#000" opacity="0.18"/>

  <!-- Magic sparkles around character -->
  <circle cx="20" cy="60" r="4" fill="#f040f0" opacity="0.6"/>
  <circle cx="100" cy="50" r="3" fill="#40c0ff" opacity="0.7"/>
  <circle cx="15" cy="90" r="2.5" fill="#ffcc00" opacity="0.8"/>
  <circle cx="108" cy="80" r="3.5" fill="#ff40a0" opacity="0.6"/>
  <path d="M22 55 L18 45 L26 48 Z" fill="#f0a020" opacity="0.7"/>
  <path d="M98 44 L102 34 L94 38 Z" fill="#40e0ff" opacity="0.7"/>

  <!-- === ROBE BOTTOM === -->
  <path d="M32 108 Q30 140 36 148 L84 148 Q90 140 88 108 Z" fill="#6a20c0" stroke="#1a0040" stroke-width="3"/>
  <!-- Robe bottom trim -->
  <path d="M32 148 Q60 154 88 148" stroke="#c0a0ff" stroke-width="2.5" fill="none"/>
  <!-- Star decorations on robe -->
  <polygon points="46,122 48,128 54,128 49,132 51,138 46,134 41,138 43,132 38,128 44,128" fill="#c0a0ff" opacity="0.6" transform="scale(0.5) translate(44,120)"/>
  <circle cx="72" cy="132" r="3" fill="#c0a0ff" opacity="0.5"/>
  <circle cx="52" cy="138" r="2" fill="#e0c0ff" opacity="0.5"/>

  <!-- === BODY === -->
  <rect x="30" y="76" width="60" height="36" rx="14" fill="#8030e0" stroke="#1a0040" stroke-width="3"/>
  <!-- Robe center chest -->
  <path d="M50 76 Q60 72 70 76 L66 112 Q60 116 54 112 Z" fill="#6a20c0" stroke="#1a0040" stroke-width="1.5"/>
  <!-- Collar gem -->
  <circle cx="60" cy="80" r="6" fill="#ff40c0" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="60" cy="80" r="3.5" fill="#ff80d0"/>
  <circle cx="58" cy="78" r="1.5" fill="white" opacity="0.8"/>
  <!-- Body highlight -->
  <ellipse cx="48" cy="86" rx="10" ry="7" fill="#a060f0" opacity="0.4"/>

  <!-- === LEFT ARM (staff arm) === -->
  <rect x="8" y="84" width="24" height="14" rx="7" fill="#8030e0" stroke="#1a0040" stroke-width="2.5"/>
  <!-- Sleeve cuff -->
  <rect x="8" y="84" width="10" height="14" rx="6" fill="#c080ff" stroke="#1a0040" stroke-width="2"/>
  <circle cx="10" cy="91" r="7" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === RIGHT ARM (spell casting) === -->
  <rect x="88" y="84" width="24" height="14" rx="7" fill="#8030e0" stroke="#1a0040" stroke-width="2.5"/>
  <rect x="102" y="84" width="10" height="14" rx="6" fill="#c080ff" stroke="#1a0040" stroke-width="2"/>
  <circle cx="110" cy="91" r="7" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Spell orb -->
  <circle cx="116" cy="84" r="12" fill="#ff40f0" stroke="#1a0040" stroke-width="2" opacity="0.85"/>
  <circle cx="116" cy="84" r="8" fill="#ff80ff"/>
  <circle cx="112" cy="80" r="4" fill="white" opacity="0.7"/>
  <!-- Orb rays -->
  <line x1="116" y1="68" x2="116" y2="63" stroke="#ff80ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="72" x2="132" y2="68" stroke="#ff80ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="72" x2="100" y2="68" stroke="#ff80ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="96" x2="132" y2="100" stroke="#c040f0" stroke-width="2" stroke-linecap="round"/>

  <!-- === STAFF === -->
  <rect x="6" y="14" width="8" height="80" rx="4" fill="#5a3010" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Staff orb -->
  <circle cx="10" cy="12" r="14" fill="#2a0080" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="10" cy="12" r="10" fill="#6020d0"/>
  <circle cx="10" cy="12" r="6" fill="#a060f0"/>
  <circle cx="6" cy="8" r="3.5" fill="white" opacity="0.6"/>
  <!-- Staff gem band -->
  <rect x="4" y="36" width="12" height="6" rx="3" fill="#ff40c0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="4" y="56" width="12" height="6" rx="3" fill="#40c0ff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- === NECK === -->
  <rect x="53" y="66" width="14" height="14" rx="6" fill="#f5c488" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === HEAD (big, round, chibi) === -->
  <ellipse cx="60" cy="46" rx="30" ry="28" fill="#f5c488" stroke="#1a1a1a" stroke-width="3"/>

  <!-- === WIZARD HAT === -->
  <!-- Brim -->
  <ellipse cx="60" cy="26" rx="32" ry="9" fill="#6a20c0" stroke="#1a0040" stroke-width="3"/>
  <!-- Hat cone -->
  <path d="M30 26 Q38 -2 60 -8 Q82 -2 90 26 Z" fill="#8030e0" stroke="#1a0040" stroke-width="3"/>
  <!-- Hat highlight stripe -->
  <path d="M38 18 Q44 4 56 0 Q68 4 74 18" stroke="#c080ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Hat star badge -->
  <polygon points="60,2 62,8 68,8 63,12 65,18 60,14 55,18 57,12 52,8 58,8" fill="#ffd020" stroke="#c0a010" stroke-width="1.5"/>

  <!-- === FACE === -->
  <!-- Eyes (big, round, CoC style) -->
  <ellipse cx="50" cy="46" rx="8" ry="9" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="70" cy="46" rx="8" ry="9" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="51" cy="47" r="5.5" fill="#8020d0"/>
  <circle cx="71" cy="47" r="5.5" fill="#8020d0"/>
  <circle cx="52" cy="47" r="3" fill="#1a1a1a"/>
  <circle cx="72" cy="47" r="3" fill="#1a1a1a"/>
  <!-- Eye highlights -->
  <circle cx="54" cy="44" r="1.8" fill="white"/>
  <circle cx="74" cy="44" r="1.8" fill="white"/>
  <!-- Eyebrows (bushy, arched) -->
  <path d="M42 36 Q50 30 58 34" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M62 34 Q70 30 78 36" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Nose (bulbous) -->
  <circle cx="60" cy="55" r="4" fill="#e8a868" stroke="#c88848" stroke-width="1.5"/>

  <!-- Smile (big grin) -->
  <path d="M50 64 Q60 72 70 64" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Beard (big white fluffy) -->
  <path d="M36 62 Q34 74 38 80 Q46 86 60 86 Q74 86 82 80 Q86 74 84 62 Q80 56 70 56 Q60 50 50 56 Q40 56 36 62 Z" fill="white" stroke="#ccc" stroke-width="1.5"/>
  <!-- Beard shading -->
  <path d="M40 68 Q44 80 52 82 Q60 84 68 82 Q76 80 80 68" stroke="#ddd" stroke-width="1.5" fill="none"/>
  <!-- Beard center part -->
  <path d="M56 74 Q58 80 60 86" stroke="#ddd" stroke-width="2" fill="none"/>
  <path d="M64 74 Q62 80 60 86" stroke="#ddd" stroke-width="2" fill="none"/>
  <!-- Mustache -->
  <path d="M48 62 Q54 66 60 64 Q66 66 72 62" fill="#ddd" stroke="#bbb" stroke-width="1"/>

  <!-- === NAME LABEL === -->
  <rect x="22" y="145" width="76" height="18" rx="6" fill="#200050" stroke="#8030e0" stroke-width="2"/>
  <text x="60" y="158" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#d080ff" letter-spacing="2">MAGE</text>
</svg>
