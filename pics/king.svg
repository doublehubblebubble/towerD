<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <!-- Shadow -->
  <ellipse cx="80" cy="193" rx="52" ry="8" fill="#000" opacity="0.22"/>

  <!-- ===================== BOOTS ===================== -->
  <!-- Left boot -->
  <ellipse cx="52" cy="178" rx="20" ry="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="32" y="162" width="40" height="20" rx="8" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Left boot gold buckle -->
  <rect x="42" y="163" width="20" height="10" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="46" y="165" width="12" height="6" rx="2" fill="#e8c040"/>

  <!-- Right boot -->
  <ellipse cx="108" cy="178" rx="20" ry="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="88" y="162" width="40" height="20" rx="8" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Right boot gold buckle -->
  <rect x="98" y="163" width="20" height="10" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="102" y="165" width="12" height="6" rx="2" fill="#e8c040"/>

  <!-- ===================== LEGS ===================== -->
  <!-- Left leg (gray) -->
  <rect x="38" y="138" width="30" height="32" rx="12" fill="#c8c8c8" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Right leg -->
  <rect x="92" y="138" width="30" height="32" rx="12" fill="#c8c8c8" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- ===================== CAPE BACK ===================== -->
  <!-- Blue cape flowing behind -->
  <path d="M20 90 Q10 130 18 170 Q30 175 40 165 L48 145 L48 90 Z" fill="#3a5aaa" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M140 90 Q150 130 142 170 Q130 175 120 165 L112 145 L112 90 Z" fill="#3a5aaa" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Cape highlight -->
  <path d="M24 95 Q16 130 22 162" stroke="#5a7acc" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M136 95 Q144 130 138 162" stroke="#5a7acc" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- ===================== BODY ===================== -->
  <!-- Main body (blue cape over gray shirt) -->
  <!-- Gray underlayer (visible at arms) -->
  <rect x="30" y="86" width="100" height="60" rx="18" fill="#b8b8c0" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Blue cape / mantle on chest -->
  <path d="M30 90 Q28 100 30 148 L50 152 L50 90 Z" fill="#4a6abf" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M130 90 Q132 100 130 148 L110 152 L110 90 Z" fill="#4a6abf" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Cape center front -->
  <path d="M50 86 Q80 80 110 86 L110 148 Q80 156 50 148 Z" fill="#4a6abf" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Cape inner shadow -->
  <path d="M54 90 Q80 84 106 90 L104 146 Q80 152 56 146 Z" fill="#3a5aaf" opacity="0.5"/>
  <!-- Cape highlight -->
  <path d="M58 88 Q80 83 88 90" stroke="#6a8ad0" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- ===================== GOLD CHAIN NECKLACE ===================== -->
  <!-- Chain links across chest -->
  <rect x="46" y="108" width="14" height="10" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="46" y="108" width="12" height="8" rx="2" fill="#e8c040"/>
  <rect x="63" y="105" width="14" height="10" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="63" y="105" width="12" height="8" rx="2" fill="#e8c040"/>
  <rect x="80" y="103" width="14" height="10" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="80" y="103" width="12" height="8" rx="2" fill="#e8c040"/>
  <rect x="97" y="105" width="14" height="10" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="97" y="105" width="12" height="8" rx="2" fill="#e8c040"/>
  <!-- Chain connectors -->
  <line x1="58" y1="113" x2="65" y2="110" stroke="#c8a020" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="110" x2="82" y2="108" stroke="#c8a020" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="108" x2="99" y2="110" stroke="#c8a020" stroke-width="3" stroke-linecap="round"/>

  <!-- ===================== ARMS ===================== -->
  <!-- Left arm (gray sleeve, stubby) -->
  <rect x="16" y="94" width="36" height="28" rx="14" fill="#b8b8c0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Left sleeve blue overlay -->
  <rect x="16" y="94" width="24" height="28" rx="12" fill="#4a6abf" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Left hand (large, pink, holding buckle) -->
  <ellipse cx="38" cy="142" rx="18" ry="16" fill="#f0b090" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Finger lines -->
  <path d="M24 138 Q26 130 32 132" stroke="#d09070" stroke-width="1.5" fill="none"/>
  <path d="M22 144 Q22 136 28 137" stroke="#d09070" stroke-width="1.5" fill="none"/>

  <!-- Right arm -->
  <rect x="108" y="94" width="36" height="28" rx="14" fill="#b8b8c0" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="120" y="94" width="24" height="28" rx="12" fill="#4a6abf" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Right hand -->
  <ellipse cx="122" cy="142" rx="18" ry="16" fill="#f0b090" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M136 138 Q134 130 128 132" stroke="#d09070" stroke-width="1.5" fill="none"/>
  <path d="M138 144 Q138 136 132 137" stroke="#d09070" stroke-width="1.5" fill="none"/>

  <!-- ===================== GOLD CROWN BELT BUCKLE (held in hands) ===================== -->
  <!-- Buckle base -->
  <rect x="54" y="126" width="52" height="38" rx="5" fill="#a87818" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="57" y="129" width="46" height="32" rx="4" fill="#c8a020"/>
  <!-- Crown cutout shape on buckle -->
  <path d="M62 158 L62 136 L68 144 L80 130 L92 144 L98 136 L98 158 Z" fill="#e8c040" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Crown shape inner detail -->
  <path d="M66 154 L66 140 L70 146 L80 134 L90 146 L94 140 L94 154 Z" fill="#a87818"/>
  <!-- Buckle highlight -->
  <ellipse cx="70" cy="133" rx="8" ry="4" fill="#e8d060" opacity="0.5"/>

  <!-- ===================== NECK ===================== -->
  <rect x="66" y="74" width="28" height="18" rx="8" fill="#f0b090" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- ===================== BEARD (dark, large, flowing) ===================== -->
  <!-- Main beard body -->
  <path d="M40 80 Q36 100 42 120 Q52 136 80 138 Q108 136 118 120 Q124 100 120 80 Q110 72 80 70 Q50 72 40 80 Z" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Beard highlight ridges -->
  <path d="M50 88 Q52 110 58 124 Q66 132 80 134" stroke="#3a3a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M110 88 Q108 110 102 124 Q94 132 80 134" stroke="#3a3a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64 88 Q64 114 68 128" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M80 88 Q80 116 80 132" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M96 88 Q96 114 92 128" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mustache (big, thick, dark) -->
  <path d="M56 80 Q68 72 80 76 Q92 72 104 80 Q96 88 80 86 Q64 88 56 80 Z" fill="#1e1e1e" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M60 80 Q70 74 80 77 Q90 74 100 80 Q92 86 80 84 Q68 86 60 80 Z" fill="#2a2a2a"/>

  <!-- ===================== HEAD ===================== -->
  <!-- Face (pink, chubby, round) -->
  <ellipse cx="80" cy="58" rx="38" ry="36" fill="#f0b090" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Face shading / cheeks -->
  <ellipse cx="58" cy="66" rx="12" ry="9" fill="#e89878" opacity="0.4"/>
  <ellipse cx="102" cy="66" rx="12" ry="9" fill="#e89878" opacity="0.4"/>
  <!-- Face highlight -->
  <ellipse cx="70" cy="42" rx="14" ry="9" fill="#fcd0b0" opacity="0.5"/>

  <!-- ===================== EYEBROWS (MASSIVE, dark charcoal) ===================== -->
  <path d="M42 52 Q56 42 72 48" fill="#1e1e1e" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M42 52 Q56 40 72 46 Q72 52 64 54 Q52 56 44 54 Z" fill="#1e1e1e"/>
  <!-- Eyebrow highlight -->
  <path d="M46 48 Q56 42 68 46" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>

  <path d="M88 48 Q104 42 118 52" fill="#1e1e1e" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M88 46 Q104 40 118 52 Q116 54 108 54 Q96 56 88 52 Z" fill="#1e1e1e"/>
  <path d="M92 46 Q104 42 114 48" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>

  <!-- ===================== EYES ===================== -->
  <!-- Eyes (mostly squinting due to big smile — CoC King style) -->
  <ellipse cx="62" cy="58" rx="9" ry="7" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="98" cy="58" rx="9" ry="7" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="63" cy="59" r="5" fill="#3a2a18"/>
  <circle cx="99" cy="59" r="5" fill="#3a2a18"/>
  <circle cx="64" cy="59" r="3" fill="#111"/>
  <circle cx="100" cy="59" r="3" fill="#111"/>
  <!-- Eye highlights -->
  <circle cx="66" cy="57" r="2" fill="white"/>
  <circle cx="102" cy="57" r="2" fill="white"/>

  <!-- ===================== NOSE ===================== -->
  <ellipse cx="80" cy="68" rx="7" ry="5" fill="#e09878" stroke="#c07858" stroke-width="1.5"/>
  <circle cx="76" cy="70" r="2" fill="#d08868" opacity="0.6"/>
  <circle cx="84" cy="70" r="2" fill="#d08868" opacity="0.6"/>

  <!-- ===================== MOUTH (big laughing grin) ===================== -->
  <!-- Open mouth -->
  <path d="M58 78 Q80 96 102 78 Q96 90 80 92 Q64 90 58 78 Z" fill="#8a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Teeth -->
  <path d="M62 80 Q80 94 98 80 Q90 86 80 87 Q70 86 62 80 Z" fill="white" stroke="#ddd" stroke-width="1"/>
  <!-- Tooth lines -->
  <line x1="72" y1="80" x2="70" y2="87" stroke="#ddd" stroke-width="1.5"/>
  <line x1="80" y1="81" x2="80" y2="87" stroke="#ddd" stroke-width="1.5"/>
  <line x1="88" y1="80" x2="90" y2="87" stroke="#ddd" stroke-width="1.5"/>

  <!-- ===================== CROWN ===================== -->
  <!-- Blue headband -->
  <rect x="42" y="26" width="76" height="22" rx="8" fill="#4a6abf" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Headband highlight -->
  <rect x="46" y="28" width="68" height="10" rx="5" fill="#6a8ad0" opacity="0.4"/>
  <!-- Center diamond gem -->
  <rect x="72" y="20" width="16" height="16" rx="3" fill="#c8a020" stroke="#1a1a1a" stroke-width="2" transform="rotate(45 80 28)"/>
  <rect x="74" y="22" width="12" height="12" rx="2" fill="#e8c040" transform="rotate(45 80 28)"/>
  <circle cx="80" cy="28" r="3" fill="white" opacity="0.7"/>

  <!-- Gold crown spikes / points -->
  <!-- Left spike -->
  <path d="M42 28 L34 8 L50 20 Z" fill="#c8a020" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M42 28 L36 10 L50 22 Z" fill="#e8c040"/>
  <!-- Left-center spike -->
  <path d="M60 24 L56 2 L70 18 Z" fill="#c8a020" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M60 24 L58 4 L70 20 Z" fill="#e8c040"/>
  <!-- Center spike (tallest) -->
  <path d="M80 22 L74 -4 L86 -4 Z" fill="#c8a020" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M80 22 L76 -2 L84 -2 Z" fill="#e8c040"/>
  <!-- Right-center spike -->
  <path d="M100 24 L90 18 L104 2 Z" fill="#c8a020" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M100 24 L90 20 L102 4 Z" fill="#e8c040"/>
  <!-- Right spike -->
  <path d="M118 28 L70 20 L84 8 L118 28 Z" fill="#c8a020" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M118 28 L72 22 L84 10 L116 26 Z" fill="#e8c040"/>

  <!-- Crown base strip -->
  <rect x="38" y="36" width="84" height="8" rx="4" fill="#a87818" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Crown side gems (small) -->
  <rect x="44" y="30" width="10" height="10" rx="2" fill="#c8a020" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 49 35)"/>
  <rect x="46" y="32" width="6" height="6" rx="1" fill="#e8c040" transform="rotate(45 49 35)"/>
  <rect x="106" y="30" width="10" height="10" rx="2" fill="#c8a020" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 111 35)"/>
  <rect x="108" y="32" width="6" height="6" rx="1" fill="#e8c040" transform="rotate(45 111 35)"/>

  <!-- Crown highlight shine -->
  <ellipse cx="62" cy="14" rx="8" ry="5" fill="#ffe060" opacity="0.4"/>

  <!-- ===================== NAME LABEL ===================== -->
  <rect x="22" y="183" width="116" height="20" rx="7" fill="#1a2040" stroke="#c8a020" stroke-width="2.5"/>
  <text x="80" y="198" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#f0c030" letter-spacing="3">KING</text>
</svg>
